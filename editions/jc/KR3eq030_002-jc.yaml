body:
  text: 卷二調經論夫婦人之病四時所感六淫七情所傷悉與男子治法同惟胎前產後崩帶經閉七症八瘕等症為異究其所因皆由經不調變生諸症大概以經如期為要岐伯曰心屬陽主血脾統血以行氣經候不調多由心君不足思慮傷脾有所勞倦穀氣不輸肺金失養腎水無資經血津液日漸枯涸所以養心則血生健脾則氣布布者則和氣暢血行調經之要斯其至矣丹溪曰經水者陰血也陰必從陽故其色紅稟火色也血為氣之配氣熱則熱氣寒則寒氣升則升氣降則降氣滯則滯氣行則行氣清則清氣濁則濁每應於月其行有常名之曰經夫經有紫有黑今人率指為風冷乘之而行溫熱之劑禍不旋踵矣經云火熱過極反化水象所以熱則紫甚則黑也況婦人性情迂滯臟腑之火無日不起非熱而何若曰風冷必須外得間有之耳婦人無子多因七情所傷氣盛血衰氣盛者謂忿鬱之邪氣盛也所以經候不調不能受孕調經種玉湯甚效若過期而色淡者加桂薑艾先期色紫者不可加減經至之日服起一日一劑連服四五劑則孕子成矣薛立齋曰經水先期為血熱加味逍遙散後期為血虛八珍湯食少體倦為鬱火加味歸脾湯發熱惡寒為氣血俱虛十全大補湯許鶴年曰經水將行先一二日小腹連腰作疼血瘀氣滯也當歸玄胡各二錢乳香陳皮炙草各一錢煎服自效經水過期不來心腹連腰作疼血虛氣寒也八珍加小茴玄胡或十全大補湯亦效經水後期或淡紅痰多血少也八珍加陳皮半夏經水行後作疼氣血俱虛也八珍或大補丸俱效經水不分先後期紫黑色血熱也四物用生地加防風荊芥穗如黑豆汁煙塵水血熱之甚也前藥加童便或六味丸腹疼加玄胡經水不分先後期紫黑成塊血熱氣凝也四物用生地加防風荊芥穗桃仁紅花香附陳皮青皮經水不止遍身四肢浮腫是脾經血虛也八珍加木通陳皮香附玄胡若面目俱腫是胃經氣虛也倍白朮白茯苓或調經丸與大補丸相間服之亦效經水不行遍身四肢浮腫是瘀血滲入脾經也八珍加桃仁紅花玄胡木香或救產丸與大補丸相間服之亦效經水正行之時忽斷不行反吐血衄血是火載血上氣之亂也四物加條芩生地麥冬丹皮或止血丸加童便服或六味地黃湯臧公三曰血者水穀之精氣滋養五臟六腑在婦人上為乳汁下為經水雖心主血肝納血總統攝於脾夫人之精血由脾胃飲食比生宜補脾胃元氣以生陰血仲景治血脫補氣東垣論陽生陰長血無單補之理也若專用四物則胃氣愈虛而血無資生之地矣調經益母丸益母草八兩砂鍋焙乾香附末二兩七制人參二兩嫩黃耆三兩蜜水炒白朮三兩土炒白茯苓三兩去黑皮乳拌蒸透粉甘草三兩去皮蜜水炒陳皮三兩熟地三兩當歸身三兩川芎二兩白芍二兩炒遠志二兩去骨水煮片時酸棗仁三兩炒透蓮肉二兩去皮心上藥為末用龍眼肉六兩好黃酒製爛杵膏和煉蜜為丸每丸重三錢曬乾收用病輕者日用一丸研末或熱黃酒下或蜜湯下有痰者薑湯下病甚者朝夕各一碗以愈為度或丸如綠豆大每服三錢亦可余仿此七制香附法香附一斤黃酒米醋鹽湯童便薑湯艾湯米泔共浸香附春五日夏三日秋七日冬十日剖開無白心為度將原湯澄清煮米湯盡曬乾聽用逍遙散當歸酒拌白芍酒炒白茯苓去皮蒸白朮土炒柴胡各一錢炙草五分加牡丹皮童便炒梔子姜炒黑各五分名加味逍遙散水煎服八珍湯四君子湯四物湯合用薑棗引煎服歸脾湯人參去蘆白朮土炒茯苓去皮龍眼肉去核酸棗仁炒透各一錢五分遠志肉去骨甘草水煮片時當歸身黃耆蜜水炒各一錢炙草五分木香三分加山梔丹皮名加味歸脾湯十全大補湯人參一錢五分白茯苓去皮一錢白朮土炒一錢五分炙草一錢當歸一錢熟地一錢五分白芍炒八分川芎七分肉桂五分不見火黃耆二錢蜜水炒四物湯當歸酒洗熟地各二錢白芍一錢五分炒川芎一錢調經種玉湯熟地一錢五分當歸身酒洗吳茱萸炒川芎白芍炒各一錢白茯苓蒸香附米便制玄胡索炒粉丹皮陳皮各八分乾薑艾葉各五分官桂三分空心溫服通經論婦人壯盛經閉者此血實氣滯宜專攻也救產丸主之虛弱經閉者此血枯宜專補也大補丸主之半虛半實經閉者宜攻補兼施之有積塊經閉者宜養血破積也通經丸與救產丸主之王節齋曰經閉不通多有脾胃損傷而致者不可便認作經閉血瘀輕用通經破血之藥通之須審其脾胃如何若因飲食勞倦損傷脾胃少食惡食泄瀉疼痛或因誤服汗下攻克之藥傷其中氣以致血少而不行者致宜補養脾胃脾旺則能生血而經通矣丹溪曰婦人經閉看因何所致而用何方以治之不可執一內經云損其肺者益其氣損其心者益其榮衛損脾者調其飲食適其寒溫損其肝者緩其中損其腎者益其精許鶴年曰脾胃虛弱不能生血而經閉者四君子或六君子加當歸川芎虛寒者加砂仁炮姜脾胃鬱火銷鑠其血而經閉者加味歸脾湯肝脾血燥自汗盜汗內耗其血而經閉者加味逍遙散脾胃氣血虛弱內熱脯而經閉者八珍湯加童便丹皮肺氣虛損不能行血而經閉者補中益氣湯腎水虛弱不能生肝木血虛發熱損傷真陰而經閉者六味地黃丸臧公三曰經云婦人之癆起於經閉因血虛不榮經絡故也蓋血虛則發熱發熱則心傷不能養脾故不嗜食脾虛則金虧故咳嗽金虧則腎水虛衰木氣不榮益發燥熱或以為血熱用涼藥解不知血熱則行血涼則凝遂成敗症當養脾胃滋陰血血足而熱自退則火不刑金金不受克則腎水有資氣血漸充經脈自通若用破血之藥反傷脾土金愈虧水愈竭骨蒸癆瘵之症成而大費調理矣雖然又當通其變治之如服滋補藥不效壯盛者宜服救產丸通之何也勞傷經閉亦有瘀血也瘀血不去則新血不生則經水不行矣通經益母丸益母草上截用八兩香附米三兩七制桃仁三兩去皮尖曬乾麩炒雙仁勿用紅花三兩酒炒當歸四兩酒洗白芍四兩酒炒白朮四兩土炒白茯苓四兩乳拌蒸透粉甘草三兩蜜水拌炒陳皮三兩丹皮三兩去骨丹參三兩酒洗共為末煉蜜為丸丸重三錢服法同前止血論丹溪曰血從上竅口鼻出者皆是陽盛陰虛有升無降血隨氣上越出上竅治法宜補陰抑陽氣降則血自歸經矣許鶴年曰婦人血崩有二一因虛一因熱虛則下陷四物加參術之類熱則妄行四物加芩連之類若虛熱宜服止血湯但崩後氣血必虧大補為主龔西園曰婦人交腸病謂糞從小便出尿自大便出也乃夏月伏暑而致須用五苓散加牛膝車前子木通俱令大小便各歸本臟即安臧公三曰失血之症非止一端大概俱是熱症但有新舊虛實之不同或妄有寒者誤也若新起屬實熱者宜養血清火止血丸主之若日久屬虛熱者宜溫補氣血大補丸主之若瘀血停滯腹疼者宜疏通之救產丸主之蓋虛實不同故治法有所異也止血益母丸益母草上截用八兩大薊用四兩陰乾香附三兩用童便制丹參三兩條芩四兩去皮酒炒熟地黃八兩杵膏忌鐵萸肉四兩去核乾山藥四兩酒炒白茯苓三兩去皮蒸熟丹皮三兩去骨酒洗澤瀉三兩去淨毛煉蜜為丸丸重三錢服法同上止血湯當歸頭一錢五分川芎八分白朮一錢土炒炙草一錢白芍一錢五分炒黃芩八分酒炒生地一錢酒洗乾薑四分炒黑升麻五分棕灰六分存性空心煎服赤白帶下論丹溪曰婦人帶下脈宜遲緩虛小不宜急疾緊大或因六淫七情或因產育房勞或因膏梁厚味或因服燥熱之藥致脾胃虧損滲入膀眺流為稠物故云帶也帶有青紅黑白黃之殊皆應五臟之色中焦之濕熱薰蒸則帶為腥腐之氣凡此皆宜壯脾胃升陽氣為主佐以各經見症之藥俱酌加炒山梔以解中焦之濕熱若傷心經則帶色紅逍遙散加黃連山梔若傷脾經則帶色黃六君子湯或歸脾湯加柴胡山梔若傷肝經則帶色青逍遙散加丹皮山梔若傷肺經則帶色白補中益氣湯加白茯苓山梔若傷腎經則帶色黑六味地黃丸若氣血俱損八珍湯許鶴年曰赤帶濕熱傷血分血不足則生熱熱逼血而錯經妄行加味四物湯以養血白帶濕熱傷氣分氣不足則生濕濕滯氣而痰積加味六君子湯以補氣赤白相兼者氣血內虛加味八珍湯以補氣血臧公三曰脾氣不足則不能過化津液而生濕脾血不足則不能滋潤一身而生熱濕熱傷其氣血以致陰虛陽弱榮血不升衛氣下陷滲入膀胱為稠物名之曰帶健脾氣則濕消養脾血則熱退而帶有不愈者鮮矣保胎論夫氣為陽陽氣壅則熱盛和順則熱清先哲云調理胎前清熱養血為主保胎丸生血行氣藥血生則胎有所養氣行則熱清而胎穩尤當因病加味百不一失如氣虛加人參血虛倍當歸熟地嘔吐少食加砂仁食不化倍白朮稍加神麯咳嗽倍紫蘇痰涎壅盛倍陳皮條芩胎漏下血倍條芩加糯米心神不寧加遠志茯神小便淋閉大便閉滋加人乳童便至八九個月及十月形體成就宜進瘦胎易產之劑婦人素壯胎肥氣實微加枳殼以散滯氣氣順則縮胎而易生婦人素弱胎怯氣虛加白朮以益元氣氣壯則能送胎而易產服得人參者加人參更妙龔金溪曰妊娠脈息和順但肢體沉重頭暈擇食甚者寒熱嘔吐胸膈煩悶名惡阻謂噁心阻其飲食切勿作寒熱症治宜保生湯或茯苓補心湯加竹茹孕婦小便澀痛頻數謂子淋乃腎與膀胱虛熱不能制水也宜子淋散妊婦小便頻數出少不疼謂轉胞宜五苓散去桂加阿膠妊婦經水時下謂胎漏屬氣血兩虛有熱宜膠艾四物湯妊娠覺氣不安或腹疼或腰疼或飲食不美或胎動下血宜安胎飲妊婦心腹作疼宜香歸止疼散許鶴年曰妊婦病傷寒煩躁之極勢必小產宜急取鍋底多年燒紅土三四碗好醋調稀掃病婦腹上三寸厚干即再換待汗出盡去此方不惟保胎亦能催胎臧公三曰婦人墜胎因氣血虛損無所榮養而然也夫胎之在腹如果之在枝枝枯果落理之自然婦人胎動而墜者大抵不外屬虛屬火二者之間清熱養血盡之矣外此而動脈者又不可不知或因飲食不節或因勞倦太過或因外感風寒或因負重閃挫或因跌僕擊觸或因房事相犯或因怒氣傷肝或因鬱氣傷脾俱能動胎宜保胎丸救之然胎有傷之輕者服之而胎穩傷之重者必致損墜若妊婦腹疼驗其面赤舌青者此胎已死急用救產丸下之以救其母下後必虛繼服大補丸保胎益母丸益母草上截三兩香附米二兩童便制熟地黃三兩歸身三兩白芍三兩酒炒川芎二兩酒洗蘇梗二兩忌鯉魚陳皮三兩炙草二兩白茯苓二兩白朮二兩條芩二兩酒炒蓮肉二兩去皮心共為末煉蜜為丸丸重三錢服法同前保生湯人參炙草各一錢白朮土炒陳皮香附七制烏藥各二錢加生薑煎服茯苓補心湯當歸川芎白芍炒熟地白茯苓去皮桔梗前胡紫蘇陳皮各一錢乾葛炒炙草人參半夏香油薑汁炒各五分子淋散麥冬去心赤茯苓大腹皮洗淨土泥薑汁拌炒甘草淡竹葉水煎服五苓散豬苓一錢澤瀉一錢白朮一錢茯苓八分加阿膠八分膠艾四物湯當歸川芎白芍酒炒條芩酒炒白朮土炒熟地砂仁炒香附童便炒黑真阿膠蛤粉炒珠艾葉少許用粳米同煎服安胎飲白朮土炒二錢條芩炒一錢五分砂仁炒熟地陳皮當歸白芍炒各一錢川芎紫蘇各八分甘草四分香歸止疼散當歸身二錢酒洗炙草一錢元胡炒一錢乳香一錢水煎服救產論夫婦人臨產之初宜選一善熟穩婆及得力家人勿使張皇以驚產婦腹疼且令扶行或疼或止名曰弄疼不可使試水手探亦不可屈腰睡臥如連腰引疼眼中如見火光此是兒轉不可坐草恐兒在腹難以轉側及胞漿先破子道乾澀皆至難產必至腹相引頻頻陣疼難以行立然後坐草抱腰之人不得傾斜則兒順易產若久坐不產熱黃酒下救產丸一粒夫當臍腹疼痛之初兒身才轉而未順若用力一逼用藥一催遂至橫生逆產所以臨月之時待胎自轉下必頭對產戶方用藥一催補其血而順其氣使子易生而胞易落也產訖用益母草五錢當歸二錢川芎一錢水煎加童便黃酒各一盞進三服百病不生上床時仰臥立膝勿伸足勿便睡不可以得男為喜過喜則傷心恐生紅汗之症不可以得女為憂恐有敗血傷心之患惟食粥勿令過飽若胎衣不下是血胞中為血所脹宜將胸間用帶束住恐上衝心胸喘急疼痛必至危殆再以物墜住臍帶用意拴縛然後截斷急服救產丸一二枚即下慎勿妄用手法王叔和云新產之脈緩滑吉實大弦急死來侵寸口焱疾不調死沉細附骨不絕生蓋產後扶虛消瘀脈卻宜虛小也醫鑑云婦人產後發熱惡寒有去血過多者有惡露不盡者有三日乳蒸者有早起勞倦者有飲食停滯者俱狀類傷寒不可輕易汗下蓋產後氣血空虛若汗之必鬱冒筋惕肉瞤昏迷不省手足搐搦大便閉結若下之則痢不止昏沉厥逆等症俱宜溫補氣血為主金溪曰婦人產後血暈下一要因症調理下血少而暈者是敗血衝心心下脹滿神昏口噤不省人事宜破血行血之藥治之救產丸失笑散選用下血多而暈者是去血過多心無血養神昏煩熱宜補血養血之藥治之八珍湯十全大補湯大補丸獨參湯選用用力太過而暈者是去血過多氣無所附陽隨陰散宜養血補氣之藥治之補中益氣湯倍歸身加香附六君子加芎歸八珍湯芎歸調血湯當歸補血湯選用醫貫曰產後及大失血後陰血暴傷必大發熱亦名陰虛發熱此陰字正謂氣血之陰若以涼藥正治立見其危殆此時不可用四物經云有形之血不能速化無形之氣所宜急固須用獨參湯或當歸補血湯此陰生陽長之義也許鶴年曰產後心腹作疼手按而痛愈甚此是血滯四物湯加桃仁紅花炮薑澤蘭益母補而散之手按而疼稍緩此是血虛四物加人參白朮炮薑益母補而養之疼而作瀉是脾虛不能運化六君子加肉蔻疼而作嘔是胃虛不能受納六君子加砂仁醫貫曰產後發熱惡寒由脾胃虧損氣血不足也經云陰虛則熱陽虛則惡寒大抵陰不足陽旺乘之則陽下陷於陰分而發熱陽不足陰旺乘之則陰上逆於陽分而惡寒此陰陽不歸其分以致寒熱交爭故發熱而惡寒也且不可用汗藥發表涼藥降火若寒盛用補中益氣湯熱盛六味地黃丸許立齋曰產後惡露未盡兒枕疼必脅肋脹滿連大小腹有塊作疼用桃仁紅花當歸川芎丹皮白芍行血破血加炮姜以行瘀若虛宜另行溫補許鶴年曰產後玉門不閉發熱惡寒氣血虛也十全大補湯加五味子切忌寒涼產後生腸不收發熱畏寒氣下陷也補中益氣湯倍升柴產後感瘧亦氣血虛補中益氣湯寒盛倍黃耆熱盛倍柴胡產後大便閉結氣血虛衰腸胃結澀不可輕用通利之劑損傷元氣宜養血潤燥當歸熟地煎湯入人乳童便黃酒日三服以通為度產後小腹急疼小便閉八味地黃湯加車前子牛膝產後血不止用生藕汁一杯黃酒一杯煮熟空心服之以愈為度小產論夫婦人懷胎大產十月已滿陰陽氣足兒自折胞而出此是時至自生如瓜熟蒂落粟熟殼開乃造化自然之妙小產如摘生瓜如採生粟破其皮殼斷其根蒂非自然者蓋胎臟損傷胞系腐爛然後墜胎豈不重於大產治法尤宜補養形氣生新血去瘀血為主臧公三曰丹溪謂產後當大補氣血雖有雜症以末治之誠不易之論也原夫妊婦向以氣血養胎而體固不甚厚況產後大耗氣血是虛而又虛者也安得不大補外此又當通其變而治之夫胎妊既分而久積之汙血須該盡脫若猶未盡腹中必硬疼宜用破血如救產丸之藥行之必要惡露驅盡方用補劑乃為正治救產益母丸益母草八兩香附四兩鹽酒童便制蒼朮四兩米泔浸炒澤蘭葉四兩桃仁四兩去皮尖麩炒雙仁勿用元胡四兩酒炒當歸二兩川芎二兩牛膝二兩俱酒炒炙草二兩共為末用大黃膏為丸川大黃十兩研細蘇木三兩河水十餘碗煎汁三碗炒紅花三兩用黃酒十餘碗煎汁三碗黑豆三碗河水煮煎汁三碗先將大黃末入鍋投好醋七八碗攪勻以文武火煎之再入醋二次不住手攪熬成膏次入紅花蘇本黑豆汁攪大黃膏內再用文武火煎成膏將前藥末為丸每丸曬乾重二錢收用最效治產難橫生倒產胎衣下下併產後血暈眼花有語錯亂心悶口乾寒熱似瘧四肢浮腫癲狂不語瀉痢腹疼大小便閉結下血如湧胸膈氣滿嘔吐不安咳嗽喉中似蟬聲面黃舌乾鼻中流血遍身生黑點血斑將丸研細末用黃酒送下一丸若子死腹中產母必腹冷脹疼上則口角嘔沫下則小便流血手足冰冷指甲青黑急以車前子一錢去殼炒香研末同丸熱酒服之死胎即下諸症服一兩丸病愈即止繼服大補丸收功可也立效散治產難胎衣不下真芝麻油蜂蜜童便各半茶盞滑石二錢為末共入一磁壺內頓二三滾入碗內加生雞蛋清一個遂攪即服立產若橫生逆產加蔥汁半茶盞攪勻服之即正產矣最效按藥料不費多錢能救人子母頃刻真良方芎歸補血飲當歸川芎白朮土炒白茯苓陳皮香附童便熟地黃烏藥乾薑炒黑益母草炙草牡丹皮當歸補血湯黃耆蜜炒一兩當歸三錢水煎丸失笑散五靈脂炒蒲黃炒各一錢熱黃酒送下產後類中風論夫產後類中風有二肝經血虛者其外症遍身手足俱熱面赤渴飲口鼻中氣熱小便黃赤內經云肝主筋而納血產後陰血去多陽火熾盛筋無血養以致手足屈伸不止俗云發搐是也治宜六味丸料加益母草煎服似補肝血肝經氣虛者其外症遍身四肢俱冷面黃不渴口鼻中氣寒小便清白內經云脾為太陰而主四肢四肢俱冷由元陽衰弱無氣以溫之也產時去血過多氣無所附以致陽隨陰衰故四肢冷亦發搐不止脾胃虛陷者補中益氣湯脾胃虛寒者十全大補湯薛立齋曰產後類中風者因產時去血過多則陰精枯竭火盛金衰木旺無制而生風故發搐不止皆內傷氣血非外感風寒也當大補氣血宜八珍湯加丹皮以生陰血不可祛風之藥產後真中風論夫產後氣血內虛外為風寒濕乘虛而入皮膚經絡則毛孔閉塞陽氣鬱結九竅不利以致頭疼身疼發熱惡寒若傷於風重感於寒則四肢筋脈拘攣無汗而惡寒若傷於風重感於濕則四肢筋脈軟弱有汗而發熱若風入於臟則心神不寧恍惚驚悸隨所傷而為病開目為陽風閉目為陰風產後得此乃氣血極虛之危症也急以十全大補湯大補氣血稍佐以祛風之劑無汗惡寒加荊芥穗防風各一錢有汗發熱加荊芥穗軟防風各五分痰盛加半夏一錢心悸加白茯苓遠志各一錢多服求應忌服食寒涼臧公三曰產後類中風者固宜專補氣血即真中風者亦當補氣血微加祛風之藥內經云風乃氣血之虛象也縱有外來風邪亦是乘虛而入若專治風是速其危也大補論夫婦人虛損成病者十之八九壯盛成病者十之二三或因虛損而經候不調或因虛損而經閉不行或因虛損而吐衄崩帶或因虛損而小胎不穩或因虛損而產後多疾大補丸諸虛之總司婦科之主帥但要審病虛實因症投劑耳醫貫云真其為陽虛也則用補中益氣湯真其為陰虛中寒也則用理中湯真其為陰虛也則用六味丸真其為陰虛無火也則用八味丸許鶴年曰婦人虛勞惟健脾養血以致其本解鬱清火以致其標久則血生熱退經自行勞自愈矣逍遙散一方健脾養血解鬱清火之良劑因加減用之可也臧公三曰婦人虛症莫要於八珍湯以氣血兼補也但肥人氣虛有痰宜豁痰補氣四君倍加四物減半瘦人血虛有火宜瀉火滋陰四物倍加四君減半大補益母丸益母草八兩用上截香附二兩七制嫩黃耆三兩蜜炒人參二兩去蘆白朮三兩土炒白茯苓二兩蒸透炙草二兩當歸身三兩俱酒洗白芍二兩酒炒陳皮二兩熟地三兩砂仁二兩炒做法同前按經不調龍眼肉炒棗仁去心蓮子煎湯下經閉炒桃仁炒紅花煎湯下下血生地炒芩丹皮煎湯下小胎不穩炒芩去白陳皮蘇梗煎湯下俱四五分為率產後惡露未淨腹中心硬疼先用黃酒服救產丸下淨瘀血繼服此丸若無惡露多服此丸補虛為主感寒加生薑發熱加童便臧公三曰六科益母丸治婦人諸症百發百中真婦科至寶但倉惶之際藥亦難得若饒裕之家多制濟人即是廣行方便其功不在渡螘下勝燒香唸佛求福渺茫者萬萬矣

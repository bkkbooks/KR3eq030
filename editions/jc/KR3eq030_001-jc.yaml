body:
  text: 卷一男子虛損癆症男病莫重於癆為其根本傷也先天根本腎也後天根本脾也腎乃藏元氣者也脾乃養形體者也治宜分陰分陽滋腎補脾以久取效但世多勞心好色以致陰虛火動人見陰虛火動往往專事清潤不知癆症多死於泄瀉泄瀉多由於寒涼此至著至確者也傷在根本治在枝葉寧有當乎故特辨之婦人胎前產後婦人病先須調經經調則無病矣故調經科居首而通經止血科次之保胎救產科又次之惟大補科居終收功神而明之存乎人耳或謂婦人胎前產後有三十六症豈六科所能盡乎然三十六症無非六科之變症也但治其本百標自愈矣虛損癆症總論經云男子之癆起於傷精精不足則氣失資化氣不足則血失所榮血不足則氣無所附蓋腎為真水腎氣竭而微陰不能與胃氣上升以接清陽之氣則元氣下陷相火大旺火旺則真陰愈爍遂發躁熱火衝上焦發熱咳嗽喘急吐痰吐血肺癆肺癰等症火結下焦發熱淋濁結爍遺精盜汗腹疼等症然其症必各見於一經如現有精濁兼之脛酸腰背拘急則其邪在腎也現有喘咳嗽血鼻塞聲重知其邪在肺也現有咯血多汗加之惕驚口舌生瘡知其邪在心也現有夢遺加之脅痛多怒頸強知其邪在肝也現有泄瀉加之腹疼痞塊飲食無味知其邪在脾也大抵陰虛多陽虛少要隨症調理世之治者往往用四物補陰黃柏知母降火不知陰虛者乃腎中之真陰虛也非四物陰血之理也火者龍雷之火也非寒涼所能降也況血藥嘗滯必至減食血藥常潤必至滑腸黃柏苦寒尤能減食知母甘寒尤能滑腸二味俱瀉腎中實火丹溪云實火可瀉虛火可補癆症之火虛乎實乎瀉之可乎即有知補者而用藥頗多疑難以保肺則妨脾保脾則妨肺也須知燥熱而甚能食而下瀉者潤而補脾亦不可缺也若虛羸而甚食少腸滑雖多喘咳惟當補脾而清潤宜戒故古人治癆補腎兼補脾蓋水為天一之元土為萬物之母二臟安和諸經各治所謂土旺而金生水旺而火熄誠不易之論也經云受補者可治不受補者不可治故丹溪專主滋陰其癆方用參者十之八九葛可久神於治癆其垂著十方多用人參自王好古有肺熱傷肺之說後人畏參不用束手待斃良可悲也然肺經自有熱者肺脈必洪數按之而實未合用參若火來乘金肺脈雖洪數按之必軟金氣大傷非參安能保之亦在乎用藥者之認症的確活變不滯耳陰虛陽虛論經云治病必求本蓋陽病陰必虛口乾舌瘡咽疼涕唾稠黏咳嗽手足發熱小便黃赤大便燥結面必赤無根之火載於上也脈弦數而疾下午及夜尤甚宜用滋補或六味地黃丸或早服九味地黃丸晚服補心健脾丸不可偏用苦寒知柏之類咽瘡失音者難治陰病陽必虛火衰不能上行腐熟水穀唾痰白胃逆不納飲食食亦不化手足逆冷小便多遺精白濁大便溏泄面不赤火入於內也脈沉緩無力上半日轉劇宜用溫補或八味丸或加減八味丸或補中益氣湯因症加減不可偏用辛香丁附之類泄瀉不止者難治總之癆症須分陰陽然後可施治否則陰虛補陽陽虛補陰誤人多矣陰虛似陽論陰虛之病反覺惡寒足冷嘔吐自汗或見小便清長與精滑頻溺之狀似陽虛之症不可作陽虛治之惟其脈必澀數口必乾燥為異雖有惡寒足冷之勢以其相火動火極似水也如陽虛病而有前項之症則其脈必微弱而口中氣息惟覺寒冷不覺乾燥為異陽虛似陰論陽虛之病反見夜熱晝止或咳嗽咽疼骨蒸煩熱兩手心焦烙面紅煩躁或陽氣不固而患脫血之狀似陰虛症不可誤作陰虛治之然形症雖如是其六脈必微弱或命門之脈衰脫及手足逆冷為異陰虛發熱論陰虛者謂勞好色內傷真陰也真陰既傷陽無所附故發熱世之不治者因陰字認不真誤以為陰故用四物補陰知柏降火百不救一不知腎中之真陰即先天也內經云真水竭則隆冬不寒真火息則盛夏不熱必須六味八味出入增減以補真陰屢用屢效有一等假熱之症煩擾狂越不欲近衣欲坐臥泥水中甚者煩極發躁渴飲不絕面如塗朱身如焚繚足心如烙吐痰如湧咳嗽喘急大便秘結小便淋瀝三部脈洪大而無倫當是時也卻似承氣熱症承氣入口即斃卻似白虎症白虎下咽即亡若用八味六味丸緩不濟事急用加減八味丸料一斤內有肉桂一兩水煎五六飯碗冰冷與飲諸症自退異日必畏寒脈脫是無火也當補其陽急服八味丸自愈此病俱變其常而不以常法治者也滋陰降火論滋陰者謂滋其陰而火自降當串講不必降火也蓋人之身陰常不足陽常有餘況節欲者少過欲者多精血既虧相火必旺火旺則陰愈消宜常補其陰使陰與陽平則水能制火水能降火斯無病矣故丹溪發明補陰之說謂專補左尺腎水也或謂少年腎水正旺似不必補然欲心正旺熾妄用太過至於中年欲心雖減少年斫喪既多焉能得實及至老來真水漸絕只有孤陽故補陰之藥自少至老不可缺也但水虛者固多火衰者亦不少當於二尺中各分陰陽虛實求其所屬而平之如左尺脈虛弱細微是左尺之真水不足用六味丸右尺脈遲軟沉細而數是命門之相火不足用八味丸是皆滋其先天之化源實萬世無窮之利也臧公三曰人之陰虛猶樹之根枯始宜以滋腎為主繼宜以參耆救肺虛則補母之義也若不先用六味壯水以鎮火而遽投參耆以補陽反使陽火愈旺金益受傷豈藥之罪哉所謂不識先後者也先天真水論先天根本腎也腎者水臟水不足則龍雷之火無畏而亢上劉河間所謂腎虛則熱是也古聖論脈謂人生之有尺脈猶樹之有根所以足於精者百病不生窮於精者萬邪蜂起先哲窺見原本亟保北方以厚生命之根而昧者多以知柏為滋陰上品不問虛實而概投之則滑腸寒胃陽明受戕何以化榮衛而潤宗筋經云壯水之主以鎮陽光六味丸是也六味地黃丸大懷生地八兩酒潤開重湯煮極透杵膏聽用山萸肉四兩去淨核微蒸懷山藥四兩炒過再用乳拌蒸白茯苓三兩去皮乳拌穀米飯上蒸透粉丹皮三兩去骨酒洗白澤瀉三兩去淨毛小便勤者減半共末煉蜜並煎杵膏為丸丸如梧桐子大空心淡鹽湯下三錢按地黃山茱萸味厚為陰中之陰故補腎陰山藥茯苓甘淡能制濕滲濕故云滲腎經澤瀉丹皮鹹苦能潤下降火故伏龍雷之火右方水泛為痰之聖劑也九味地黃丸熟地黃四兩杵膏山萸肉二兩去淨核微蒸懷山藥三兩炒再用乳拌蒸白茯苓三兩去皮蒸透粉丹皮二兩去骨酒洗白澤瀉一兩去淨毛小便勤者減半加人參二兩去蘆麥冬二兩去心遼五味一兩炒煉蜜並前杵膏為丸如梧子大空心熱水服三錢按六味地黃丸天一生水之良劑也而又加味何也經云虛則補其母蓋肺為腎母人參補之麥冬清之五味斂之所以滋其上源也右方不燥不寒兼理脾胃治陰虛龍雷之火至和平至應驗久服則灼陰之火自除濟火之水益滋效在六味丸之上不必用七味及治之方也先天相火論經云兩腎中間一點是真精即命門相火也蓋一陽生於二陰之間所以位乎北而成乎坎也人非此火無以運行三焦腐熟水穀生化之源或幾乎息矣此火與人火不同人火者可以濕伏可以水滅可以直折黃連之屬可以制之相火者龍火也雷火也寄於肝腎之間乃水中之火若用黃柏知母苦寒之藥又是濕伏水減直折龍雷之火愈發矣龍雷之火每當濃陰驟雨之時火焰愈熾惟陽火一照火自滅息此得水則熾得火則滅之一驗也此相火不可以水滅而用辛熱之義也經云益火之源以消陰翳八味丸是也八味腎氣丸六味丸加肉桂二兩不見火大附子一兩炮製如法去附子加五味名加減八味丸按肉桂性熱與火同性雜在下焦壯水藥中能引無根虛火降而歸經附子健悍能噓既槁之陽春右方水沸泛為痰之聖劑也製附子法黑附子擇一兩三四錢重頂圓正九頂如蓮花瓣兼底平者佳先用麵包附子入火燒熱取出去淨皮臍切四大片用童便鹽湯防風湯甘草湯浸一二日令透即用浸附子湯去渣文火煮附子以湯盡為度切薄片焙乾視有白星者再焙至無白星收用後天脾胃論後天根本脾胃是也人之有脾胃猶其家之有餉道餉道一絕萬眾立散脾胃一敗百藥難施古聖著脈謂四時皆以胃氣為本有胃氣則生無胃氣則死矣東垣脾胃論亦有胃中元氣勝能食而不傷過時而不飢脾胃俱旺能食肥脾胃俱虛不能食而瘦能食而瘦者胃伏火邪於氣分則能食脾虛則肌肉削也每見世俗一遇脾胃虛滯便投山楂麥芽香砂枳樸之類甚而用黃連山梔以為脾胃良方不知此皆實則瀉子之法因脾胃有積聚有實火元氣未衰邪氣方張者宜之若虛而伐之則愈虛虛而寒之遏其生化之源則脾胃愈傷脾胃傷則元氣必耗陰火上衝氣高而喘身熱而煩脾胃之氣下陷穀氣不得升浮是春生之令不行無陽以護其榮衛乃生寒熱經曰癆者溫之損者補之又曰甘溫能除大熱故補中益氣正取其溫養之義也經云水穀入口其味有五各注其海津液各走其道胃者水穀之海也飲食不節則胃病胃病則氣短精神少而生大熱胃既病則脾無所稟受脾為死陰不主事故亦從而病焉形體勞倦則脾病脾病則怠惰嗜臥四肢無力大便泄瀉脾既病則胃不能獨行津液故亦從而病焉其所生病之先後雖異所受邪則一也醫貫云人之脾胃當分別陰陽水火而調之如不思飲食此屬陽明胃土受病須補少陰心火歸脾湯補心火以生胃土也能食不化此屬太陰脾土受病須補少陽相火八味丸補相火以生脾胃土也無非欲人培養一點先天之火氣以補土母耳補中益氣湯陽虛宜之嫩黃耆錢半蜜炙人參一錢去蘆白朮一錢土炒甘草一錢蜜炙陳皮一錢當歸一錢酒洗升麻三分柴胡三分水碗半薑棗煎服按中者脾胃居中為四臟之主氣者中焦無形之氣所以蒸腐水穀升降出入是先天之氣又為脾胃之主也補心健脾丸陰虛宜之白茯苓一兩蒸透陳皮一兩人參三錢炙草五錢當歸身一兩酒洗白芍八錢炒棗仁二兩炒透麥冬六錢去心桔梗六錢蓮子八錢去心衣龍眼肉八錢山藥八錢炒煉蜜為丸臧公三曰經云精不足者補之以味洪範論味而曰稼穡作甘世間謂五穀得味之正淡食五穀大能養精又曰胃為水穀氣血之海化榮衛而潤宗筋是胃強則腎充而精氣旺胃病則精傷而陽事衰補後天即所以補先天也醫貫謂飲食入胃猶水穀在釜中非火不熱夫人腎氣若壯丹田之火上蒸脾土脾土溫暖中州自運則能化食矣若房勞過度則真陽衰憊坎水不溫則中州不運故飲食弗進胸膈痞塞或不食而脹滿或既食而不消皆下焦真火不能上蒸脾土補先天即所以補後天也故曰先天后天不得截然兩分虛癆吐痰論王節齋曰痰之本水也原於腎痰之動濕也主於脾世人用二陳為治痰通劑然以治濕痰寒痰則是也若陰水不足陰火上炎肺受火侮不得清肅下行故其津液隨氣而升凝結成痰腥穢稠濁甚則有帶血而出者此非中焦脾胃濕痰寒痰之所比亦非半夏南星之所治惟用滋陰之劑使上逆之火得返其宅而息焉則痰自清投以二陳立見殆矣醫貫云痰者水也原人身之所有非水泛為痰即水沸為痰但當分有火無火之異耳腎中之火虛不能制水則水不歸源如水逆行洪水氾濫而為痰是無火者也故用八味丸補火以制水腎中之水虛不能制火則火動而水沸騰動於腎者猶龍火之出於海龍興而水附動於肝者猶雷火之出於地者疾風暴雨水隨波湧而為痰是有火者也故用六味丸補水以制火此不治痰之標而治痰之本者也然有火無火之痰何以辨之曰無火者純是清水有火者中有稠濁白沫為辨耳至其用藥於腎虛者先以六味八味壯水之主益火之原後以四君子或六君子補脾以制水於脾虛者既先補中理中以補土繼以六味八味制水以益土子母互相生克而於治之道其庶幾矣蒙筌謂地黃泥膈生痰為痰門禁藥以薑汁炒之嗟乎以薑汁炒之則變為辛燥地黃無用矣蓋地黃正取其濡潤之品能入腎經若雜於脾胃藥中土本惡濕安能不泥膈生痰六味地黃丸諸品皆少陰經藥群隊相引直入下焦名曰水泛為痰之聖藥空腹服之壓以美膳不留胃中此古賢立方之妙又何疑焉四君子湯人參一錢去蘆云白朮錢半土炒白茯苓錢半去皮甘草八分蜜炙六君子湯四君子湯加半夏一錢薑汁炒透陳皮一錢理中湯人參一錢去蘆白朮二錢土炒乾薑八分炙草八分虛癆吐血論陰虛吐血有二陰中之火虛則腎中寒冷龍雷無可安之宅穴不得已而遊行於上故血亦隨火而妄行八味丸中桂附二味純陽之火加於六味純陰水中使腎宮溫暖如冬日一陽來復於水土之下龍雷之火自然歸就於原宅不用寒涼而火自降不必止血而血自安陰中之水虛則腎水乾枯而火炎者去附桂純用六味丸以補水制火血亦自安不必去火俱水為主夫人之吐血多起於咳嗽咳嗽血者肺病也方家以止嗽藥治肺兼治血而不效何也腎脈入肺二臟相連病則俱病而其根在腎腎中有水有火水乾火然陰火刑金故咳嗽嗽中有痰唾帶血而出者腎水逐相火炎上之血也惟六味丸獨補腎水性不寒涼不損脾胃久服則水升火降而愈又須人參救肺補脾藥收功醫貫曰吐衄非陰虛則陽虛今人一見血症以為陰虛者血虛也舍四物何法乎火動者熱也非芩連梔柏何藥乎咳嗽者火也非紫菀百部知母何物乎誰知陰虛之病大抵上熱下寒者始而以寒涼進之上焦非不爽快醫者病者無不謂道在是矣稍久則食減又以食不化加神麯山楂再久而熱愈盛痰咳愈多煩燥愈甚又以藥力欠到寒涼倍增而滑瀉腹脹之症作矣乃以枳殼大腹皮寬中之藥快氣之品進之不危何待是故咳嗽吐血時時發熱未必成瘵也服四物黃柏之類不已則瘵成矣胃滿膨脹悒悒不快未必成脹也服山楂神麯之藥不已則脹成矣面浮胕腫小便秘澀未必成噎也服滲利之藥不已則噎成矣成則不可服藥及至於危乃曰病犯條款雖對症之藥無可奈何豈不愚哉虛癆咳嗽論咳為無痰而有聲嗽為有痰而有聲其要皆主於肺而治之之法不在於肺而在於脾又不專在於脾而反歸重於腎蓋脾者肺之母也腎者肺之子故虛則補其母虛則補其子也如外感風寒而咳嗽今人率以麻黃紫蘇之類發散表邪如果系形氣病氣俱實者一汗而愈若形氣病氣稍虛者宜以補脾為主而佐以解表之藥何也脾實則肺金有養皮毛有衛已入之邪易出後來之邪無自而入矣若專解表則肺氣益虛腠理益疏外邪乘間而入何時能已也須以人參黃耆甘草補脾並桂枝以驅邪此不治肺而治脾虛則補母之義也仁齋直指云肺出氣腎納氣也肺為氣之主腎為氣之藏凡咳嗽暴重動引百骸自覺氣從臍下逆奔而上者此腎虛不能收氣歸元當以六味腎氣丸主之勿徒從事於肺虛則補其子也有火爍肺金而咳嗽者宜清金降火今之醫書中論清金降火者以黃芩天冬麥冬桑根白皮清肺金以黃連降心火石膏降胃火以四物黃柏知母降陰火殊不知清金降火之理似是而實非補北方正所以瀉南方也滋其陰正所以降火也蓋病本起於房勞不過虧損真陰陰虛而火上火上而刑金故咳嗽則金不能不傷矣宜先壯水之主用六味丸補其真陰使水升而火降即以參耆救肺之品以補腎中之母使金水相生而病愈矣虛癆發喘論內經云諸喘皆屬於上又謂諸逆衝上皆屬於火蓋火之有餘水之不足也陽之有餘陰之不足也凡諸逆沖之火皆下焦相火出於腎肝者也腎水虛衰相火偏盛壯火食氣銷鑠肺金烏得而不喘氣耶須用六味地黃丸料加麥冬五味子大劑煎飲以壯水之主則水升火降而喘自定蓋緣陰水虛故有火有火則有痰有痰則咳嗽咳嗽甚則喘也有一等似火而非火似喘而非喘者其人平日若久病但覺氣喘非氣喘也乃氣不歸元也視其外症四肢厥逆面赤而煩燥惡熱似火非火也乃命門真元之火離其宮而不歸也察其脈兩寸浮大而數兩尺微而無力或似有而無為辨耳不知者以其有火也少用涼藥以清之以其喘急難禁也佐以四磨湯之類以寬之下咽之後似覺稍快少頃依然豈知寬一分更耗一分甚有見其稍快誤認藥力且到倍進寒涼快氣之劑立見其弊矣何也蓋陰虛至喘去死不遠幸幾希一線牽帶在命門之根易治者以助元接真溫補下元之劑俾反本歸元或可全生然亦不可峻驟也且先以八味丸煎人參生脈散送下覺氣若稍定然後以十全大補湯加補骨脂牛膝等以鎮墜之於下又以八味丸日夜遇飢則吞服方可然猶未也須遠房幃絕色欲經年積月方可保全不守此禁終亦必亡而已聰明男子當自治未病毋踏此危機十全大補湯人參一錢五分去蘆白茯苓一錢去皮白朮一錢五分土炒炙草八分當歸一錢五分熟地一錢五分白芍八分酒炒川芎七分肉桂五分去皮黃耆二錢蜜炙人參生脈散人參三錢去蘆五味子二錢研碎麥冬二錢去心虛癆消渴論經曰二陽結為之消二陽者陽明也手陽明大腸主津液消則目黃口乾乃津液不足也足陽明胃主血熱則消穀易飢血中伏火乃血不足也結者結而不潤燥熱而渴皆真水消耗所致宜分三消而治之上消者肺也多飲水而少食小便如常治宜以肺胃為急麥冬花粉生甘草生地乾葛人參之類然必由心有事以致虛火上攻宜茯神安心竹葉清火能食而渴為實熱人參石膏湯不能食而渴為虛熱白朮散中消者胃也善食易飢自汗大便硬小便數黃赤治宜甘辛降火地連丸或豬肚丸下消者腎也人之有腎猶木之有根因色欲過度腎水虛衰足膝痿弱面黑形瘦耳焦小便頻數稠濁如膏較諸病為重治宜壯水之主則渴飲不思六味丸若元陽衰敗宜兼益火之原八味丸或加減八味丸蓋無陽無以生陰也醫貫曰治消之法無分上中下總是下焦命門火不歸元遊於肺則為上消遊於胃則為中消先治腎為急其間攝養失宜水火偏勝惟六味八味加減八味丸逐症而服降其心火滋其腎水則渴自止渴病愈多發腦疽背癰宜預先服忍疼膏黃酒下可免趙氏曰人有服地黃湯而渴仍不止者何也蓋心肺位近宜制小其劑腎肝位遠宜制大其劑如上消中消可以前丸緩治若下消已極大渴大燥須加減八味丸料一斤內有肉桂一兩如煎五六碗恣意冰冷服之熟眠而渴病如失亦在乎人之變通耳有一等渴飲一二口即厭者此中氣寒寒水泛上迫其浮火於口舌之間故上焦一段欲得水救若到中焦以見水自然惡之治法如面紅煩躁者理中湯送八味丸三消脈多洪數無力洪數是虛火無力是氣血不足宜滋養不宜燥劑俱宜服茯菟丸禁半夏及發汗更戒厚味酒面房事等項人參石膏湯人參五分石膏一錢打碎炙草五分粳米一撮白朮散四君子加五味子炒乾葛地連丸生地黃白藕各取自然汁一升牛乳一升熬成膏炒黃連末為丸如綠豆大每日白湯下三錢豬肚丸黃連二兩炒麥門冬熟地五味子花粉各二兩人參一兩共為末入雄豬肚內縫煮極熟搗爛煉蜜為丸食後米湯下百丸茯菟丸菟絲子十兩蒸五味子七兩炒白茯苓五兩蒸蓮子四兩去皮心共為末山藥六兩打糊為丸如綠豆大米湯下三錢臧公三曰余有一單方無病寡欲遇病絕欲如是則愛念不生萬慮澄澈水火自然交媾何病之有否則雖藥無功遇病七戒不可不知恣縱慆淫不自珍重一也陰陽莫分攻補妄投二也姑息日久肌肉消脫三也求治心急陰火愈動四也寢興不適飲食無度五也憚服藥丸過用湯劑盪滌腸胃六也今日預愁明日窘若拘囚無瀟灑趣七也

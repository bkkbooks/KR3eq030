body:
  text: 序蓋醫者意也借望聞問切四者以一己之心理而揣度夫病理援五行生剋之標榜而定其所傷何部以形式而論似屬談空細繹之固有至理在焉醫學者實理學也即古聖所謂格致學也憑一人有限之心理而揣摩夫無限之病理淺試之未能盡中夫病竅故自軒岐以來四千餘年名醫輩出著作汗牛非偏於涼清即偏於溫補偶有得竅之方法或終身祕而不宣或傳授不肯盡言而自祕私心不死者衆故諺云醫者後世不昌是作也不敢云無所偏謬實系家傳三世臨症確驗雖屬一得之愚洵堪自信本邑王鶴侶先生亦醫友也屢勸付梓以廣流傳爰詳加校定以便付印並擬數言以志緣起於簡端云清嘉慶十九年八月上旬識於五蓮山之望海書樓山東諸城縣臧達德公三氏自識時年六十有五歲

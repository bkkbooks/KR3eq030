body:
  text: 卷三痘瘡發熱小兒痘瘡發熱大抵與傷寒相似脈多洪數煩燥臉赤唇紅或身疼腹疼頭疼噁心或呵欠煩悶咳嗽噴嚏但耳尖中指尻骨足梢皆冷及耳後紅絲赤縷顯露者此其症也即當體認經絡陰陽明白不可妄投藥劑以致誤汗誤下慎之慎之點分輕重痘瘡初發稀朗紅潤者輕牽聯乾枯紫黑者重痘分經絡呵欠煩悶屬肝時發驚悸屬心乍寒多睡屬脾煩赤嗽嚏屬肺四經有毒惟腎無毒若熱極而為腎水所制方變黑歸腎也陽症陰症瘡色紅盛譫語弄舌煩渴不寧足胭熱兩腮紅大便祕小便澀氣急脈洪大而舌上生胎者乃陽症也戒用熱藥瘡色灰白癢塌陷頂寒顫咬牙足脛冷肚腹虛脹面白吐瀉脈沉細而舌上溫潤如常者乃陰症也戒用寒藥若非大熱大寒之症用藥當以和平為主表裡虛實凡吐瀉少食為裡虛不吐瀉能食為裡實灰白色陷頂多汗為表虛紅綻無汗為表實大凡表裡氣血貴和平不宜偏勝陰陽相和為平陰陽偏勝為病輕變重論食生冷月婦外人穢觸犯房事誤汗誤下見點後誤服升麻葛根湯誤服人參太早陽症陰虛誤服熱藥陰症陽虛誤服涼藥重變輕論避風寒節飲食遠香臭忌生人戒酒色用藥得宜認痘疔訣痘大者疔也紫黑者為疔臭爛者為疔若痘瘡灰色不起者即當認出痘疔速用銀針挑斷其根吮出惡血即以四聖散塗之頭髮灰珍珠鍛豌豆各等分為細末用好油胭脂調勻塗入疔瘡內能令遍身痘瘡即轉紅活逐日附方凡痘瘡初出顏色紅潤者不須服藥若隱於肌肉之間不即見點者宜服加減升麻湯升麻四分桔梗三分生甘草一分羌活三分水一盅燈心十根煎三分不拘時服見點二日三日如粟如黍光澤明淨身無大熱者不須服藥若熱盛痘多宜服消毒飲當歸酒洗川芎山楂連軺去穰各四分前胡二分去皮木通二分去皮甘草一錢煎法同前四日五日大小不等根窠紅潤者不須服藥若色暗陷頂及欠起發者宜服牛蒡子湯牛蒡子五分炒研碎當歸酒洗川芎黃耆蜜炙茯苓去皮各四分桔梗陳皮連軺去穰各三分大腹皮三分酒洗淨土煎法如前六日毒化漿行痘瘡肥滿者不須服藥若欠起發及不潤澤者宜服托裡散當歸酒洗川芎黃耆蜜炙白朮土炒陳皮牛蒡子炒研碎茯苓去皮各五分桔梗二分通草二分水一盅炒糯米一撮煎四分食遠服若毒已化而漿欠足者加人參三分七日八日漿來充足飲食不減者不須服藥若痘塌漿虧者宜服加味保元湯人參去蘆白朮土炒黃耆蜜炙當歸酒洗陳皮各五分通草二分煎法如前若發癢加白芷四分蟬蛻三分酒洗淨若漿色虛白再加人參五分外用燈心縛成小帚輕輕掃之九日十日漿老如黃蠟色或結靨高厚別無他症者不須服藥若漿不足及靨薄者宜服十奇散人參去蘆白朮土炒白芍酒炒牛蒡子茯苓去皮陳皮當歸酒洗各五分桔梗通草炙草各二分水一盅龍眼肉五枚煎四分食遠服十一日十二日身不潮熱飲食不減者不須服藥若當靨不靨及痂落無托靨者宜服解毒飲當歸酒洗白芍酒洗人參去蘆山楂黃耆蜜炙荊芥牛蒡子炒研碎防風各五分炙草一分水煎服若陽症陰虛各照本方加黃芩二分黃連四分俱酒炒熱甚者用生黃連生黃芩各四分或加柴胡二三分亦可熱甚發狂譫語弄舌者宜服犀角地黃湯犀角生地連翹黃連當歸各五分牡丹皮三分水一盅煎四分不拘時服若陰症陽虛咬牙寒顫各照本方加制過熱附子二分製附子法見一卷八味丸門內梔子丁香麥冬各三分生薑三片同煎溫服若痘瘡靨前靨後痰咳不止並飲食銼喉者各照本方加川貝母麥冬杏仁同煎八九日之外宜加五味子陰虛泄瀉陰虛泄瀉者宜服調中解毒湯陳皮山藥炒川芎白朮土炒赤茯苓木通黃連酒炒連軺去穰甘草山楂肉枚各等分水一盅薑皮一小片蓮肉三枚煎四分食遠服如久瀉不止加訶子肉四分炒陽虛泄瀉陽虛泄瀉者宜服補中健脾湯陳皮山藥訶子肉煨人參白朮土炒砂仁炒研碎川芎木香各等分不見火水一盅生薑三片炒糯米一撮蓮肉五枚煎四分食遠溫服如不止加肉豆蔻五分煨如泄甚者宜用豆蔻丸肉豆蔻麵裹煨熟去油木香不見火砂仁白龍骨枯白丸訶子肉濕紙裹煨赤石脂各等分共為末神麯糊為丸如黍米大每服三十丸炒米湯下臧公三曰治痘之法以氣血為主然氣血盛故能逐痘毒而火毒盛亦能損氣血急則治其標緩則治其本宜補氣血總以發透托三法為治痘祕訣
